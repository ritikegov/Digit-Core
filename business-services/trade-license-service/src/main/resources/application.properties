# ===============================
# Database (DISABLED - Using Registry Service)
# ===============================
# spring.datasource.url=jdbc:postgresql://localhost:5432/tradelicense
# spring.datasource.username=postgres
# spring.datasource.password=1234
# spring.jpa.hibernate.ddl-auto=update
# spring.jpa.show-sql=true

# Disable JPA auto-configuration since we're using Registry
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration

# ===============================
# Server
# ===============================
server.port=8087

# ===============================
# Spring Configuration
# ===============================
spring.main.allow-bean-definition-overriding=true

# ===============================
# ID Generation
# ===============================
tl.idgen.applicationNumber.templateCode=TL_APPLICATION_NUMBER
tl.idgen.licenseNumber.templateCode=TL_LICENSE_NUMBER
tl.idgen.registryId.templateCode=TL_APPLICATION_NUMBER

# ===============================
# Workflow
# ===============================
tl.workflow.processCode=TL_FINAL
tl.workflow.defaultAction=APPLY
tl.workflow.defaultRole=CITIZEN
tl.workflow.state.pendingPayment=PENDING_PAYMENT
tl.workflow.state.licenseIssued=LICENSE_ISSUED

# ===============================
# Digit Platform Services
# ===============================
digit.services.boundary.base-url=https://digit-lts.digit.org
digit.services.workflow.base-url=https://digit-lts.digit.org
digit.services.idgen.base-url=https://digit-lts.digit.org
digit.services.notification.base-url=https://digit-lts.digit.org
digit.services.filestore.base-url=https://digit-lts.digit.org
digit.services.mdms.base-url=https://digit-lts.digit.org

# ===============================
# Digit Client Configuration
# ===============================
digit.client.id=trade-license-service
digit.client.header.client-id=trade-license-service

# JWT Token Configuration for DIGIT services
digit.client.jwt.enabled=true
digit.client.auth.enabled=true

# Tenant configuration - try different property names
digit.client.tenant.header.enabled=true
digit.client.tenant.header.name=x-tenant-id
digit.client.headers.tenant-id.enabled=true
digit.client.propagate.tenant=true

# Registry Service specific configuration
digit.services.registry.tenant.required=true
digit.services.registry.headers.tenant-id=true

# ===============================
# Billing Service (DIGIT 3.0) - Port Forward Configuration
# ===============================
# Using port-forwarded billing service until gateway routing is configured
# Command: kubectl port-forward billing-fffd8dc7d-s6sh9 -n egov 8080:8080
billing.service.host=http://localhost:8080
tl.business.service=TL
tl.billingslab.schema-code=TL.BillingSlab2

# Billing Service Gateway Status
# The billing service exists in k8s cluster: billing-fffd8dc7d-s6sh9 in egov namespace
# Port-forward active: localhost:8080 -> billing-service:8080
# Gateway routing will be added later for production

# ===============================
# MDMS Configuration (Optimized for DIGIT 3.0)
# ===============================
# Core business logic schemas (REQUIRED)
tl.mdms.licensetype.schema-code=TL.LicenseType
tl.mdms.tradetype.schema-code=TL.TradeType
tl.mdms.structuretype.schema-code=TL.StructureType
tl.mdms.accessorycategory.schema-code=TL.AccessoryCategory
tl.mdms.documenttype.schema-code=TL.DocumentType

# Fee calculation schemas (REQUIRED)
tl.mdms.billingslab.schema-code=TL.BillingSlab2

# Renewal calculation schemas (REQUIRED for RENEWAL applications)
tl.mdms.rebate.schema-code=TL.Rebate
tl.mdms.penalty.schema-code=TL.Penalty

# Optional schemas (can be removed if not used)
# tl.mdms.uom.schema-code=TL.UOM
# tl.mdms.financialyear.schema-code=TL.FinancialYear

# REMOVED: Tax heads now managed by Billing Service 3.0
# tl.mdms.taxhead.schema-code=TL.TaxHeadMaster (DELETED)
# tl.mdms.calculationtype.schema-code=TL.CalculationType (DELETED)

# ===============================
# Renewal Calculation
# ===============================
tl.renewal.rebate.taxhead=TL_TIME_REBATE
tl.renewal.penalty.taxhead=TL_TIME_PENALTY

# ===============================
# Validation
# ===============================
tl.validation.min.period=2592000000
tl.validation.allow.previous=false
digit.services.registry.base-url=https://digit-lts.digit.org
tl.registry.schema-code=TLLICENSE1

# ===============================
# Notification Templates Configuration
# ===============================
# Template IDs for Trade License notifications
tl.notification.template.created=tl-application-created
tl.notification.template.updated=tl-application-updated
tl.notification.template.approved=tl-application-approved
tl.notification.template.payment-due=tl-payment-due
tl.notification.template.issued=tl-license-issued
tl.notification.template.rejected=tl-application-rejected
tl.notification.template.reopened=tl-application-reopened

# ===============================
# DIGIT 3.0 Billing Integration Configuration
# ===============================
# Business service code for Trade License in Billing Service
tl.billing.business-service-code=TL

# Response enrichment settings
tl.billing.enrich-responses=true
tl.billing.include-payment-history=true
tl.billing.include-fee-breakdown=true

# Billing workflow integration
tl.billing.generate-demand-on-approve=true
tl.billing.auto-generate-bills=false

# IDGEN Configuration for Billing Service
# IDGEN service is required for bill number generation
# Ensure IDGEN service is accessible and has TL_BILL_NUMBER template configured
tl.billing.idgen.bill-number.template=BillNumber

# Bill generation settings (when enabled)
tl.billing.bill-expiry-days=30
tl.billing.partial-payment-allowed=true
tl.billing.min-payable-amount=10