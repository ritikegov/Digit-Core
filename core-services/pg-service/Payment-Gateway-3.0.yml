openapi: 3.0.3
info:
  title: Payment Gateway Service
  version: 3.0.0
  description: |
    pg-service acts as a liaison between eGov modules and external payment gateways.
    It supports transaction creation, status update, search, and active gateway discovery.
  contact:
    name: Egovernments Foundation
    email: contact@egovernments.org

servers:
  - url: https://api.example.com/pg-service
    description: Production server
  - url: https://staging-api.example.com/pg-service
    description: Staging server

security:
  - BearerAuth: []

tags:
  - name: Transaction
  - name: Gateway

paths:
  /transaction/v3/_create:
    post:
      summary: Initiate a payment transaction
      operationId: initiateTransaction
      tags: [Transaction]
      description: Creates a payment transaction and returns redirect URL (for non-zero amount transactions).
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/CorrelationIdHeader'
        - $ref: '#/components/parameters/UserAgentHeader'
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/ForwardedForHeader'
        - $ref: '#/components/parameters/ClientId'
        - $ref: '#/components/parameters/ClientSecret'
        - $ref: '#/components/parameters/TimeStamp'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionRequest'
      responses:
        '200':
          description: Payment Initiated successfully, gateway redirection triggered.
          headers:
            X-Response-Time: { $ref: '#/components/headers/X-Response-Time' }
            X-Response-Timestamp: { $ref: '#/components/headers/X-Response-Timestamp' }
            X-Request-ID: { $ref: '#/components/headers/X-Request-ID' }
            X-Correlation-ID: { $ref: '#/components/headers/X-Correlation-ID' }
            X-Tenant-ID: { $ref: '#/components/headers/X-Tenant-ID' }
            X-Rate-Limit: { $ref: '#/components/headers/X-Rate-Limit' }
            X-Rate-Limit-Remaining: { $ref: '#/components/headers/X-Rate-Limit-Remaining' }
            X-Rate-Limit-Reset: { $ref: '#/components/headers/X-Rate-Limit-Reset' }
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TransactionCreateResponse'
        '400':
          description: Payment initiation failed
          content:
            application/json:
              schema:
                $ref: 'https://raw.githubusercontent.com/egovernments/egov-services/master/docs/common/contracts/v1-0-0.yml#/definitions/ErrorRes'

  /transaction/v3/_search:
    get:
      summary: Search transactions
      operationId: searchTransactions
      tags: [ Transaction ]
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/CorrelationIdHeader'
        - $ref: '#/components/parameters/UserAgentHeader'
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/ForwardedForHeader'
        - $ref: '#/components/parameters/ClientId'
        - $ref: '#/components/parameters/ClientSecret'
        - $ref: '#/components/parameters/TimeStamp'
        - name: txnId
          in: query
          required: false
          description: Transaction id generated by the service during creation.
          schema: { type: string }
        - name: billId
          in: query
          required: false
          description: Unique module based ID for which the transaction is being initiated, if billId is used, module should be included.
          schema: { type: string }
        - name: userUuid
          in: query
          required: false
          description: User ID of the user as registered in user service, for whom the transaction was  carried out.
          schema: { type: string }
        - name: receipt
          in: query
          required: false
          description: Receipt ID generated for this payment
          schema: { type: string }
        - name: consumerCode
          in: query
          required: false
          description: Unique identifier in the module for which the transaction is being initiated
          schema: { type: string }
        - name: txnStatus
          in: query
          required: false
          description: Current status of the transaction
          schema: { type: string }
          enum: [ SUCCESS, FAILURE, PENDING ]
      responses:
        '200':
          description: Matching transactions
          headers:
            X-Response-Time: { $ref: '#/components/headers/X-Response-Time' }
            X-Response-Timestamp: { $ref: '#/components/headers/X-Response-Timestamp' }
            X-Request-ID: { $ref: '#/components/headers/X-Request-ID' }
            X-Correlation-ID: { $ref: '#/components/headers/X-Correlation-ID' }
            X-Tenant-ID: { $ref: '#/components/headers/X-Tenant-ID' }
            X-Rate-Limit: { $ref: '#/components/headers/X-Rate-Limit' }
            X-Rate-Limit-Remaining: { $ref: '#/components/headers/X-Rate-Limit-Remaining' }
            X-Rate-Limit-Reset: { $ref: '#/components/headers/X-Rate-Limit-Reset' }
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TransactionResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: 'https://raw.githubusercontent.com/egovernments/egov-services/master/docs/common/contracts/v1-0-0.yml#/definitions/ErrorRes'

  /transaction/v3/_update:
    put:
      summary: Update transaction from gateway callback params
      operationId: updateTransactions
      tags: [ Transaction ]
      description: |
        Updates transaction status based on callback/query params received from payment gateway.
        Transaction ID is read from gateway-specific transaction-id parameter keys.
      parameters:
        - $ref: '#/components/parameters/RequestIdHeader'
        - $ref: '#/components/parameters/CorrelationIdHeader'
        - $ref: '#/components/parameters/UserAgentHeader'
        - $ref: '#/components/parameters/TenantIdHeader'
        - $ref: '#/components/parameters/ForwardedForHeader'
        - $ref: '#/components/parameters/ClientId'
        - $ref: '#/components/parameters/ClientSecret'
        - $ref: '#/components/parameters/TimeStamp'
        - name: transactionId
          in: query
          required: false
          schema: {type: string}
          description: Example transaction-id key used by some gateways. Other gateway-specific keys are also accepted.
      responses:
        '200':
          description: Transaction updated
          headers:
            X-Response-Time: { $ref: '#/components/headers/X-Response-Time' }
            X-Response-Timestamp: { $ref: '#/components/headers/X-Response-Timestamp' }
            X-Request-ID: { $ref: '#/components/headers/X-Request-ID' }
            X-Correlation-ID: { $ref: '#/components/headers/X-Correlation-ID' }
            X-Tenant-ID: { $ref: '#/components/headers/X-Tenant-ID' }
            X-Rate-Limit: { $ref: '#/components/headers/X-Rate-Limit' }
            X-Rate-Limit-Remaining: { $ref: '#/components/headers/X-Rate-Limit-Remaining' }
            X-Rate-Limit-Reset: { $ref: '#/components/headers/X-Rate-Limit-Reset' }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: 'https://raw.githubusercontent.com/egovernments/egov-services/master/docs/common/contracts/v1-0-0.yml#/definitions/ErrorRes'

  /gateway/v3/_search:
    get:
      summary: Fetch active gateways
      operationId: fetchActiveGateways
      tags: [ Gateway ]
      responses:
        '200':
          description: Active payment gateways
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

components:
  securitySchemes:
    BearerAuth:
      $ref: 'https://raw.githubusercontent.com/egovernments/DIGIT-3.0/master/common-3.0.0.yaml#/components/securitySchemes/BearerAuth'

  parameters:
    RequestIdHeader:
      $ref: 'https://raw.githubusercontent.com/digitnxt/digit3/refs/heads/master/docs/services/common/Common-3.0.0.yaml#/components/parameters/RequestIdHeader'
    CorrelationIdHeader:
      $ref: 'https://raw.githubusercontent.com/digitnxt/digit3/refs/heads/master/docs/services/common/Common-3.0.0.yaml#/components/parameters/CorrelationIdHeader'
    UserAgentHeader:
      $ref: 'https://raw.githubusercontent.com/digitnxt/digit3/refs/heads/master/docs/services/common/Common-3.0.0.yaml#/components/parameters/UserAgentHeader'
    TenantIdHeader:
      $ref: 'https://raw.githubusercontent.com/digitnxt/digit3/refs/heads/master/docs/services/common/Common-3.0.0.yaml#/components/parameters/TenantIdHeader'
    ForwardedForHeader:
      $ref: 'https://raw.githubusercontent.com/digitnxt/digit3/refs/heads/master/docs/services/common/Common-3.0.0.yaml#/components/parameters/ForwardedForHeader'
    ClientId:
      $ref: 'https://raw.githubusercontent.com/digitnxt/digit3/refs/heads/master/docs/services/common/Common-3.0.0.yaml#/components/parameters/ClientId'
    ClientSecret:
      $ref: 'https://raw.githubusercontent.com/digitnxt/digit3/refs/heads/master/docs/services/common/Common-3.0.0.yaml#/components/parameters/ClientSecret'
    TimeStamp:
      $ref: 'https://raw.githubusercontent.com/digitnxt/digit3/refs/heads/master/docs/services/common/Common-3.0.0.yaml#/components/parameters/TimeStamp'
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: Provide a unique value to prevent duplicate creations on retries.
      schema:
        type: string
        minLength: 8
        maxLength: 128

  headers:
    X-Response-Time:
      $ref: 'https://raw.githubusercontent.com/digitnxt/digit3/refs/heads/master/docs/services/common/Common-3.0.0.yaml#/components/headers/X-Response-Time'
    X-Response-Timestamp:
      $ref: 'https://raw.githubusercontent.com/digitnxt/digit3/refs/heads/master/docs/services/common/Common-3.0.0.yaml#/components/headers/X-Response-Timestamp'
    X-Request-ID:
      $ref: 'https://raw.githubusercontent.com/digitnxt/digit3/refs/heads/master/docs/services/common/Common-3.0.0.yaml#/components/headers/X-Request-ID'
    X-Correlation-ID:
      $ref: 'https://raw.githubusercontent.com/digitnxt/digit3/refs/heads/master/docs/services/common/Common-3.0.0.yaml#/components/headers/X-Correlation-ID'
    X-Tenant-ID:
      $ref: 'https://raw.githubusercontent.com/digitnxt/digit3/refs/heads/master/docs/services/common/Common-3.0.0.yaml#/components/headers/X-Tenant-ID'
    X-Rate-Limit:
      $ref: 'https://raw.githubusercontent.com/digitnxt/digit3/refs/heads/master/docs/services/common/Common-3.0.0.yaml#/components/headers/X-Rate-Limit'
    X-Rate-Limit-Remaining:
      $ref: 'https://raw.githubusercontent.com/digitnxt/digit3/refs/heads/master/docs/services/common/Common-3.0.0.yaml#/components/headers/X-Rate-Limit-Remaining'
    X-Rate-Limit-Reset:
      $ref: 'https://raw.githubusercontent.com/digitnxt/digit3/refs/heads/master/docs/services/common/Common-3.0.0.yaml#/components/headers/X-Rate-Limit-Reset'
  schemas:
    TransactionRequest:
      type: object
      required:
        - Transaction
      properties:
        Transaction:
          $ref: '#/components/schemas/Transaction'

    TransactionCreateResponse:
      type: object
      properties:
        Transaction:
          $ref: '#/components/schemas/Transaction'

    TransactionResponse:
      type: object
      properties:
        Transaction:
          type: array
          items:
            $ref: '#/components/schemas/Transaction'

    Transaction:
      type: object
      description: Details of the payment object.
      required:
        - txnAmount
        - billId
        - consumerCode
        - taxAndPayments
        - productInfo
        - gateway
        - callbackUrl
        - user
      properties:
        tenantId:
          type: string
          readOnly: true
        txnAmount:
          type: string
          description: Transaction Amount, preferably rounded off to two decimal places
          minLength: 1
        billId:
          type: string
          description: Unique bill ID associated with the transaction
        module:
          type: string
          description: Module business code for which the transaction is being initiated, ex PT, WS, PGR etc
        consumerCode:
          type: string
          description: Unique identifier in the module for which the transaction is being initiated
        taxAndPayments:
          type: array
          items:
            $ref: '#/components/schemas/TaxAndPayment'
        productInfo:
          type: string
          description: Brief description for which the transaction is being carried out.
        gateway:
          type: string
          description: Gateway to be used, from the available list, such as PAYTM, PHONEPE.
        callbackUrl:
          type: string
          description: URL to which control has to be redirected to from the gateway
        txnId:
         type: string
         readOnly: true
         description: Transaction ID of the payment, generated by the gateway service
        user:
          $ref: '#/components/schemas/User'
        txnStatus:
         type: string
         readOnly: true
         description: Current status of the transaction
         enum:
          - SUCCESS
          - FAILURE
          - PENDING
        txnStatusMsg:
          type: string
          readOnly: true
          description: Brief status message for the transaction
        gatewayTxnId:
          type: string
          readOnly: true
          description: Transaction ID returned by the gateway, for reference
        gatewayPaymentMode:
          type: string
          readOnly: true
          description: Mode of payment used at the gateway
        gatewayStatusCode:
          type: string
          readOnly: true
          description: Payment Gateway Specific RAW status code
        gatewayStatusMsg:
          type: string
          readOnly: true
          description: Payment Gateway Specific RAW status message
        receipt:
          type: string
          readOnly: true
          description: Receipt ID generated for this payment
        additionalDetails:
          type: object
        auditDetails:
          $ref: 'https://raw.githubusercontent.com/egovernments/egov-services/master/docs/common/contracts/v1-0-0.yml#/definitions/AuditDetails'

    TaxAndPayment:
      type: object
      required:
        - billId
        - amountPaid
      properties:
        billId:
          type: string
        taxAmount:
          type: number
        amountPaid:
          type: number

    User:
      type: object
      readOnly: true
      required:
        - uuid
        - userName
        - name
        - mobileNumber
        - tenantId
      properties:
        tenantId:
          type: string
          description: Unique Identifier of the tenant to which user primarily belongs
        uuid:
          type: string
          description: UUID for the user.
        userName:
          type: string
          description: The unique username used of the user - this will be used for user login. This needs to be unique within the tenant.
          minLength: 4
          maxLength: 64
        name:
          type: string
          description: The full name of the user.
          minLength: 3
          maxLength: 100
        mobileNumber:
          type: string
          description: Mobile number of the user
          maxLength: 10
        emailId:
          type: string
          description: Email address of the user
          maxLength: 128
